version: '3.8'

services:
  db:
    image: postgres:17.0-alpine3.19
    container_name: interviews_db
    restart: unless-stopped
    environment:
      TZ: GMT-3
      PGDATA: /var/lib/postgresql/data
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_DB: ${PG_DB}
    ports:
      - "${PG_PORT:-5523}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER} -d ${PG_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: interviews_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PG_HOST: db
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/opt/app
      - /opt/app/.venv
    working_dir: /opt/app
    command: >
      uv run gunicorn
      --bind ${HOST:-0.0.0.0}:${PORT:-8000}
      "${APP_MODULE}"
      -k uvicorn.workers.UvicornWorker
      -w 4

  frontend:
    image: node:20-alpine
    container_name: interviews_frontend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
    command: sh -c "npm install && npm run dev -- -p 3000"
    depends_on:
      - api

volumes:
  pg_data:
